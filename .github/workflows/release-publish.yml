name: Release Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Verify tag and metadata versions
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          PACKAGE_VERSION="$(node -p 'JSON.parse(require("fs").readFileSync("package.json","utf8")).version')"

          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag version (${TAG_VERSION}) does not match package.json (${PACKAGE_VERSION})"
            exit 1
          fi

          node scripts/sync-release-version.mjs --check

      - name: Install parser dependencies
        working-directory: scaffold/scripts/parsers
        run: npm ci

      - name: Run root tests
        run: |
          npm test

      - name: Run context runtime and MCP compatibility tests
        working-directory: scaffold/mcp
        run: |
          npm ci
          npm run test:ci

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
